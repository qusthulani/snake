<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Snake — KQ Games</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Space Mono', monospace;
            background: #0a0a0a;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            padding: 20px;
            user-select: none;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        .back-btn {
            display: inline-block;
            color: #444;
            text-decoration: none;
            font-size: 0.8em;
            letter-spacing: 1px;
            margin-bottom: 15px;
            transition: color 0.3s;
        }

        .back-btn:hover { color: #fff; }

        h1 {
            font-size: 1.5em;
            letter-spacing: 4px;
            color: #fff;
            margin-bottom: 5px;
        }

        .score-board {
            display: flex;
            gap: 30px;
            justify-content: center;
            margin-bottom: 20px;
        }

        .score-item {
            text-align: center;
        }

        .score-label {
            font-size: 0.65em;
            color: #444;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .score-value {
            font-size: 1.4em;
            color: #fff;
            font-weight: 700;
        }

        canvas {
            border: 1px solid #1a1a1a;
            border-radius: 10px;
            display: block;
            background: #0d0d0d;
        }

        .game-overlay {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }

        .game-wrap {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .overlay-title {
            font-size: 1.5em;
            letter-spacing: 3px;
            color: #fff;
        }

        .overlay-sub {
            font-size: 0.8em;
            color: #555;
            letter-spacing: 2px;
        }

        .start-btn {
            background: #fff;
            color: #000;
            border: none;
            padding: 12px 30px;
            font-family: 'Space Mono', monospace;
            font-size: 0.9em;
            letter-spacing: 2px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 5px;
        }

        .start-btn:hover {
            background: #ddd;
            transform: translateY(-2px);
        }

        /* Mobile Controls */
        .mobile-controls {
            display: grid;
            grid-template-columns: repeat(3, 55px);
            grid-template-rows: repeat(3, 55px);
            gap: 8px;
            margin-top: 25px;
        }

        .ctrl-btn {
            background: #111;
            border: 1px solid #222;
            border-radius: 10px;
            color: #fff;
            font-size: 1.3em;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.1s ease;
            -webkit-tap-highlight-color: transparent;
        }

        .ctrl-btn:active {
            background: #1a1a1a;
            transform: scale(0.95);
        }

        .ctrl-up    { grid-column: 2; grid-row: 1; }
        .ctrl-left  { grid-column: 1; grid-row: 2; }
        .ctrl-down  { grid-column: 2; grid-row: 2; display: none; }
        .ctrl-right { grid-column: 3; grid-row: 2; }
        .ctrl-down2 { grid-column: 2; grid-row: 3; }
    </style>
</head>
<body>
    <div class="header">
        <a href="javascript:history.back()" class="back-btn">← BACK</a>
        <h1>SNAKE</h1>
    </div>

    <div class="score-board">
        <div class="score-item">
            <div class="score-label">Score</div>
            <div class="score-value" id="score">0</div>
        </div>
        <div class="score-item">
            <div class="score-label">Best</div>
            <div class="score-value" id="best">0</div>
        </div>
        <div class="score-item">
            <div class="score-label">Level</div>
            <div class="score-value" id="level">1</div>
        </div>
    </div>

    <div class="game-wrap" id="gameWrap">
        <canvas id="canvas"></canvas>
        <div class="game-overlay" id="overlay">
            <div class="overlay-title">🐍 SNAKE</div>
            <div class="overlay-sub">Gunakan arrow key atau kontrol di bawah</div>
            <button class="start-btn" id="startBtn">MULAI</button>
        </div>
    </div>

    <div class="mobile-controls">
        <button class="ctrl-btn ctrl-up" onclick="setDir(0,-1)">↑</button>
        <button class="ctrl-btn ctrl-left" onclick="setDir(-1,0)">←</button>
        <button class="ctrl-btn ctrl-down2" onclick="setDir(0,1)">↓</button>
        <button class="ctrl-btn ctrl-right" onclick="setDir(1,0)">→</button>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const overlay = document.getElementById('overlay');
        const startBtn = document.getElementById('startBtn');

        // Responsive canvas
        const SIZE = Math.min(window.innerWidth - 40, 360);
        const GRID = 20;
        const CELL = Math.floor(SIZE / GRID);
        canvas.width = CELL * GRID;
        canvas.height = CELL * GRID;

        let snake, dir, nextDir, food, score, best = 0, level, gameLoop, running = false;

        function init() {
            snake = [{x: 10, y: 10}];
            dir = {x: 1, y: 0};
            nextDir = {x: 1, y: 0};
            score = 0;
            level = 1;
            updateScore();
            spawnFood();
        }

        function spawnFood() {
            let pos;
            do {
                pos = {
                    x: Math.floor(Math.random() * GRID),
                    y: Math.floor(Math.random() * GRID)
                };
            } while (snake.some(s => s.x === pos.x && s.y === pos.y));
            food = pos;
        }

        function update() {
            dir = {...nextDir};
            const head = {x: snake[0].x + dir.x, y: snake[0].y + dir.y};

            // Wall collision
            if (head.x < 0 || head.x >= GRID || head.y < 0 || head.y >= GRID) return gameOver();
            // Self collision
            if (snake.some(s => s.x === head.x && s.y === head.y)) return gameOver();

            snake.unshift(head);

            if (head.x === food.x && head.y === food.y) {
                score += 10 * level;
                if (score > best) best = score;
                level = Math.floor(score / 50) + 1;
                updateScore();
                spawnFood();
                clearInterval(gameLoop);
                gameLoop = setInterval(update, Math.max(80, 200 - (level * 15)));
            } else {
                snake.pop();
            }

            draw();
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Grid dots
            ctx.fillStyle = '#111';
            for (let x = 0; x < GRID; x++) {
                for (let y = 0; y < GRID; y++) {
                    ctx.fillRect(x * CELL + CELL/2 - 1, y * CELL + CELL/2 - 1, 2, 2);
                }
            }

            // Snake
            snake.forEach((s, i) => {
                const alpha = 1 - (i / snake.length) * 0.5;
                ctx.fillStyle = i === 0 ? '#fff' : `rgba(200, 200, 200, ${alpha})`;
                ctx.beginPath();
                ctx.roundRect(s.x * CELL + 1, s.y * CELL + 1, CELL - 2, CELL - 2, 4);
                ctx.fill();
            });

            // Food
            ctx.fillStyle = '#fff';
            ctx.beginPath();
            ctx.arc(food.x * CELL + CELL/2, food.y * CELL + CELL/2, CELL/3, 0, Math.PI * 2);
            ctx.fill();
        }

        function gameOver() {
            clearInterval(gameLoop);
            running = false;
            overlay.innerHTML = `
                <div class="overlay-title">GAME OVER</div>
                <div class="overlay-sub">Score: ${score} | Best: ${best}</div>
                <button class="start-btn" onclick="startGame()">MAIN LAGI</button>
            `;
            overlay.style.display = 'flex';
        }

        function updateScore() {
            document.getElementById('score').textContent = score;
            document.getElementById('best').textContent = best;
            document.getElementById('level').textContent = level;
        }

        function startGame() {
            overlay.style.display = 'none';
            init();
            running = true;
            clearInterval(gameLoop);
            gameLoop = setInterval(update, 200);
            draw();
        }

        function setDir(x, y) {
            if (x === 1 && dir.x === -1) return;
            if (x === -1 && dir.x === 1) return;
            if (y === 1 && dir.y === -1) return;
            if (y === -1 && dir.y === 1) return;
            nextDir = {x, y};
        }

        document.addEventListener('keydown', e => {
            if (!running) return;
            const keys = {
                ArrowUp: [0,-1], ArrowDown: [0,1],
                ArrowLeft: [-1,0], ArrowRight: [1,0],
                w: [0,-1], s: [0,1], a: [-1,0], d: [1,0]
            };
            if (keys[e.key]) {
                e.preventDefault();
                setDir(...keys[e.key]);
            }
        });

        startBtn.addEventListener('click', startGame);

        // Touch swipe support
        let touchStartX, touchStartY;
        canvas.addEventListener('touchstart', e => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        });
        canvas.addEventListener('touchend', e => {
            const dx = e.changedTouches[0].clientX - touchStartX;
            const dy = e.changedTouches[0].clientY - touchStartY;
            if (Math.abs(dx) > Math.abs(dy)) {
                setDir(dx > 0 ? 1 : -1, 0);
            } else {
                setDir(0, dy > 0 ? 1 : -1);
            }
        });

        init();
        draw();
    </script>
</body>
</html>
